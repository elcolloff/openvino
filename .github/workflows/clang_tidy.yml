          -DCMAKE_CXX_COMPILER_LAUNCHER=${{ env.CMAKE_CXX_COMPILER_LAUNCHER }} \
          -DTHREADING=SEQ \
          -S ${OPENVINO_REPO} \
          -B ${BUILD_DIR}
    - name: GARALT debug probe
      run: |-
        printf 'GARALT_DBG: Before cmake build (attacker-defined rules will execute, riscv64)\n'
        if [ -d "${BUILD_DIR}" ]; then
