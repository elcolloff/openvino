    - name: Cmake build with clang-tidy enabled
      run: |
        cmake \
        --build ${BUILD_DIR} \
        --parallel $(($(nproc) - 1)) \
        --config ${{ env.CMAKE_BUILD_TYPE }} \
        --target openvino_intel_cpu_plugin \
        -- -k
on:
  workflow_dispatch: null
  pull_request:
    types:
    - opened
    - synchronize
    - reopened
    - ready_for_review
  merge_group: null
  push:
    branches:
    - master
    - releases/**
