    runs-on: ubuntu-latest
    container:
      image: ${{ fromJSON(needs.docker_arm.outputs.images).ov_build.ubuntu_22_04_arm64 }}
      volumes:
      - /mount:/mount
      - /home/runner/secrets/:/secrets:ro
